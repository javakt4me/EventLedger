name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and run tests
        run: mvn -B -DskipTests=false test

  docker-e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Start Docker Compose services
        run: |
          docker-compose up --build -d

      - name: Wait for services to be healthy
        run: |
          # Wait up to 60s for gateway and account health endpoints
          for i in {1..30}; do
            if curl -sSf http://localhost:8080/events/health >/dev/null 2>&1 && curl -sSf http://localhost:8081/actuator/health >/dev/null 2>&1; then
              echo "Services are up"
              break
            fi
            sleep 2
          done

      - name: Run e2e script (PowerShell)
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -Command "./scripts/e2e-docker-test.ps1"

      - name: Tear down Docker Compose
        if: always()
        run: docker-compose down
