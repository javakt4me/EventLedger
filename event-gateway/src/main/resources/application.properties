spring.application.name=event-gateway
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:gatewaydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Resilience4j Configuration
# Use correct property names and a count-based sliding window so tests that set small
# slidingWindowSize behave predictably.
resilience4j.circuitbreaker.instances.accountService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.accountService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.accountService.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.accountService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.accountService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.accountService.slowCallDurationThreshold=2s

resilience4j.retry.instances.accountService.maxAttempts=3
resilience4j.retry.instances.accountService.waitDuration=500ms
resilience4j.retry.instances.accountService.intervalFunction.name=exponential
resilience4j.retry.instances.accountService.intervalFunction.exponentialBackoffMultiplier=2.0

# H2 Console (optional)
spring.h2.console.enabled=false

# Sleuth Configuration (Distributed Tracing)
spring.sleuth.traceId128=true
spring.sleuth.propagation.type=w3c,b3
spring.sleuth.sampler.probability=1.0

# Downstream account service base URL (Docker compose hostname by default)
account.service.url=http://account-service:8081

# Actuator Configuration (Health & Metrics)
management.endpoints.web.exposure.include=health,metrics,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.metrics.export.simple.enabled=true
management.health.defaults.enabled=true

# JSON Logging
logging.pattern.json={"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","service":"event-gateway","traceId":"%X{traceId}","spanId":"%X{spanId}","level":"%level","logger":"%logger{36}","message":"%msg"}
